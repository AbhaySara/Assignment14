<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student CRUD App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🎓 Student CRUD Application</h1>

        <form id="studentForm">

            <input type="text"
                   id="name"
                   placeholder="Enter Student Name"
                   required>

            <input type="number"
                   id="age"
                   placeholder="Enter Age"
                   required>

            <input type="text"
                   id="course"
                   placeholder="Enter Course"
                   required>

            <button type="submit">
                Add Student
            </button>

        </form>

        <hr>

        <h2>Student List</h2>

        <table>

            <thead>

                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="studentTableBody">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
